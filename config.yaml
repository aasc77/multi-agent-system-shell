nats:
  url: nats://127.0.0.1:4222
  stream: AGENTS
  subjects_prefix: agents

tmux:
  nudge_prompt: "You have new messages in your inbox. Use the check_messages MCP tool to read them."
  nudge_cooldown_seconds: 30
  max_nudge_retries: 20
  nudge_send_retries: 3

tasks:
  max_attempts_per_task: 5

providers:
  stt:
    backend: whisper
    url: http://192.168.1.51:5112
  tts:
    backend: piper
    url: http://192.168.1.51:5111
  # Voice understanding (audio -> text + optional tool_call). Runtime-callable
  # via orchestrator.providers.voice.get_voice_provider(cfg["providers"]["voice"]).
  # Switch backends by flipping `backend` -- other keys may stay in place and
  # are read on-demand. See README "Voice provider" section for the HTTP
  # contract and the Phi-4 Multimodal swap example.
  voice:
    backend: whisper_llm  # voxtral | whisper_llm | phi4_multimodal | null
    voxtral:
      url: http://192.168.1.41:5100      # RTX5090 Voxtral endpoint (#16)
      timeout_seconds: 30
    whisper_llm:
      stt_url: http://192.168.1.51:5112  # DGX Whisper /transcribe
      llm_url: http://192.168.1.51:11434 # DGX Ollama /v1/chat/completions
      model: qwen3:8b
      timeout_seconds: 30
    phi4_multimodal:
      url: http://192.168.1.41:5100
      timeout_seconds: 30
