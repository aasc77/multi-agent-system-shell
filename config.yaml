nats:
  url: nats://127.0.0.1:4222
  stream: AGENTS
  subjects_prefix: agents

tmux:
  # `nudge_prompt` is the base text. At runtime the orchestrator
  # auto-prepends a `[<ISO-8601 UTC ts> <source>] ` traceability
  # prefix (see #66 / orchestrator/tmux_comm.py::_format_nudge_prefix).
  # No config key controls the prefix itself — it is always on, and
  # each orchestrator call site passes its own `<source>` tag
  # (`orch.delivery`, `orch.watchdog`, `orch.announcer`,
  # `orch.taskqueue`, `orch.console`, `orch.router`, `orch.lifecycle`).
  nudge_prompt: "You have new messages in your inbox. Use the check_messages MCP tool to read them."
  nudge_cooldown_seconds: 30
  max_nudge_retries: 20
  nudge_send_retries: 3

tasks:
  max_attempts_per_task: 5

# #80: heartbeat-gated NEIGHBOR UP/DOWN + proactive alert.
# Each MCP bridge publishes on `agents.<role>.heartbeat` every
# `interval_seconds`. The orchestrator forces an agent to DOWN
# when no heartbeat has been seen within `max_age_seconds`
# (2 × interval is the default — one missed publish absorbed).
# `startup_grace_seconds` suppresses DOWN demotion while the
# orchestrator is freshly booted so bridges still coming up
# don't trigger false logouts. `alert_on_neighbor_down` +
# `neighbor_down_alert_cooldown_seconds` control the proactive
# `manager_directive` (subtype `agent_logout`). The env
# `MAS_SUPPRESS_DOWN_ALERTS=1` overrides all of this for orderly
# shutdowns.
heartbeat:
  interval_seconds: 30
  max_age_seconds: 60
  startup_grace_seconds: 60
  alert_on_neighbor_down: true
  neighbor_down_alert_cooldown_seconds: 600

providers:
  stt:
    backend: whisper
    url: http://192.168.1.51:5112
  tts:
    backend: piper
    url: http://192.168.1.51:5111
