project: remote-test
tmux:
  session_name: remote-test

nats:
  url: nats://192.168.1.38:4222

agents:
  manager:
    runtime: claude_code
    working_dir: .
    role: monitor
    system_prompt: "You are the manager agent. Follow the instructions in manager/CLAUDE.md exactly. Start your monitoring loop immediately. Be silent when things work."
  hub:
    runtime: claude_code
    working_dir: ./workspace
    system_prompt: "You are a collaborator agent on the Mac hub. Complete the assigned task and report results via send_message. To message other agents directly, use send_to_agent with target_agent (hub, dgx, macmini, or hassio) and message. When nudged, always call check_messages first. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them."
  dgx:
    runtime: claude_code
    ssh_host: dgx@192.168.1.51
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    system_prompt: "You are a collaborator agent on the DGX server. Complete the assigned task and report results via send_message. To message other agents directly, use send_to_agent with target_agent (hub, dgx, macmini, or hassio) and message. When nudged, always call check_messages first. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them."
  macmini:
    runtime: claude_code
    ssh_host: angelserrano@192.168.1.44
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    remote_node_path: ~/local/bin/node
    system_prompt: "You are a collaborator agent on the Mac Mini. Complete the assigned task and report results via send_message. To message other agents directly, use send_to_agent with target_agent (hub, dgx, macmini, or hassio) and message. When nudged, always call check_messages first. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them."
  hassio:
    runtime: claude_code
    ssh_host: hassio@192.168.1.50
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    system_prompt: "You are a collaborator agent on the Hassio server. Complete the assigned task and report results via send_message. To message other agents directly, use send_to_agent with target_agent (hub, dgx, macmini, or hassio) and message. When nudged, always call check_messages first. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them."

state_machine:
  initial: idle
  states:
    idle: { description: "No active task" }
    waiting_hub: { agent: hub }
    waiting_dgx: { agent: dgx }
    waiting_macmini: { agent: macmini }
    waiting_hassio: { agent: hassio }
  transitions:
    # Task starts at hub
    - from: idle
      to: waiting_hub
      trigger: task_assigned
      action: assign_to_agent
      action_args: { target_agent: hub }

    # Hub completes → DGX picks up (with hub's output)
    - from: waiting_hub
      to: waiting_dgx
      trigger: agent_complete
      source_agent: hub
      status: pass
      action: assign_to_agent
      action_args: { target_agent: dgx }

    # DGX completes → Mac Mini picks up (with all prior output)
    - from: waiting_dgx
      to: waiting_macmini
      trigger: agent_complete
      source_agent: dgx
      status: pass
      action: assign_to_agent
      action_args: { target_agent: macmini }

    # Mac Mini completes → Hassio picks up
    - from: waiting_macmini
      to: waiting_hassio
      trigger: agent_complete
      source_agent: macmini
      status: pass
      action: assign_to_agent
      action_args: { target_agent: hassio }

    # Hassio completes → done
    - from: waiting_hassio
      to: idle
      trigger: agent_complete
      source_agent: hassio
      status: pass

    # Any agent fails → flag human
    - from: "*"
      to: idle
      trigger: agent_complete
      status: fail
      action: flag_human
      action_args: { reason: "agent failed task" }
