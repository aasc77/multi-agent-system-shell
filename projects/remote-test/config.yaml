project: remote-test
tmux:
  session_name: remote-test

nats:
  url: nats://127.0.0.1:4222

routing:
  probe_interval: 10
  process_interval: 5
  neighbor_timeout: 120
  max_attempts: 6
  table_log_interval: 60

watchdog:
  enabled: true
  check_interval: 15
  idle_cooldown: 60
  announce_on_speaker: false
  inactivity_announcer:
    enabled: false
    threshold_seconds: 300
    escalate_after: 3
    announce_on_speaker: false

agents:
  manager:
    runtime: claude_code
    working_dir: .
    role: monitor
    label: manager
    system_prompt: "You are the manager agent. Follow the instructions in manager/CLAUDE.md exactly. Start your monitoring loop immediately. Be silent when things work."
  hub:
    runtime: claude_code
    working_dir: ./workspace
    label: dev
    system_prompt: "You are the dev agent. Your role is to write code, build features, deploy services, and fix bugs. You are the primary builder — the orchestrator codebase is local at /Users/angelserrano/Repositories/multi-agent-system-shell/. When you finish work, notify macmini (the QA agent) to verify it. To message other agents directly, use send_to_agent with target_agent (hub, dgx, dgx2, macmini, or hassio) and message — NOTE: your internal agent name is still 'hub' in the messaging system but everyone refers to you as 'dev'. When nudged, always call check_messages first. When replying to a message, always check the from field and reply to that agent — not yourself or manager unless they sent it. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them. When you complete a major task, hit a blocker, or need the user attention, use /speak to announce it on the home speakers."
  macmini:
    runtime: claude_code
    ssh_host: angelserrano@192.168.1.44
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    remote_node_path: ~/local/bin/node
    label: macmini (qa)
    system_prompt: "You are the QA agent on the Mac Mini. Your role is to verify, test, and validate work done by other agents — especially hub (the dev agent). Review code, run tests, verify deployments, and confirm things actually work before reporting pass/fail. Do not write production code — that is hub job. To message other agents directly, use send_to_agent with target_agent (hub, dgx, dgx2, macmini, or hassio) and message. When nudged, always call check_messages first. When replying to a message, always check the from field and reply to that agent — not hub or manager unless they sent it. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them. When you complete a major task, hit a blocker, or need the user attention, use /speak to announce it on the home speakers."
  dgx:
    runtime: claude_code
    ssh_host: dgx@192.168.1.51
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    label: dgx1
    system_prompt: "You are a collaborator agent on the DGX server. Complete the assigned task and report results via send_message. To message other agents directly, use send_to_agent with target_agent (hub, dgx, dgx2, macmini, or hassio) and message. When nudged, always call check_messages first. When replying to a message, always check the from field and reply to that agent — not hub or manager unless they sent it. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them. When you complete a major task, hit a blocker, or need the user attention, use /speak to announce it on the home speakers."
  dgx2:
    runtime: claude_code
    ssh_host: dgx2@192.168.1.49
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    label: dgx2
    system_prompt: "You are a collaborator agent on DGX2 (second DGX Spark). Complete the assigned task and report results via send_message. To message other agents directly, use send_to_agent with target_agent (hub, dgx, dgx2, macmini, or hassio) and message. When nudged, always call check_messages first. When replying to a message, always check the from field and reply to that agent — not hub or manager unless they sent it. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them. When you complete a major task, hit a blocker, or need the user attention, use /speak to announce it on the home speakers."
  RTX5090:
    runtime: script
    ssh_host: angel@192.168.1.41
    command: powershell
    label: RTX5090
  hassio:
    runtime: claude_code
    ssh_host: hassio@192.168.1.50
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    label: hassio
    system_prompt: "You are the Home Assistant agent on the Hassio server. You own all HA integrations: speaker service (voice announcements via HA media_player), TTS pipeline (Piper on port 5111, Whisper STT on port 5112), camera/ONVIF credential management (Reolink NVR at 192.168.1.46), HA entity updates (sensors, binary_sensors), and automations. You are the authority on anything that touches Home Assistant. To message other agents directly, use send_to_agent with target_agent (hub, dgx, dgx2, macmini, or hassio) and message. When nudged, always call check_messages first. When replying to a message, always check the from field and reply to that agent — not hub or manager unless they sent it. Files shared by the user appear in the shared/ directory of your workspace — use your Read tool to view them. When you complete a major task, hit a blocker, or need the user attention, use /speak to announce it on the home speakers."

state_machine:
  initial: idle
  states:
    idle: { description: "No active task" }
    waiting_hub: { agent: hub }
    waiting_dgx: { agent: dgx }
    waiting_dgx2: { agent: dgx2 }
    waiting_macmini: { agent: macmini }
    waiting_hassio: { agent: hassio }
  transitions:
    # Task starts at hub
    - from: idle
      to: waiting_hub
      trigger: task_assigned
      action: assign_to_agent
      action_args: { target_agent: hub }

    # Hub completes → DGX picks up (with hub's output)
    - from: waiting_hub
      to: waiting_dgx
      trigger: agent_complete
      source_agent: hub
      status: pass
      action: assign_to_agent
      action_args: { target_agent: dgx }

    # DGX completes → DGX2 picks up
    - from: waiting_dgx
      to: waiting_dgx2
      trigger: agent_complete
      source_agent: dgx
      status: pass
      action: assign_to_agent
      action_args: { target_agent: dgx2 }

    # DGX2 completes → Mac Mini picks up
    - from: waiting_dgx2
      to: waiting_macmini
      trigger: agent_complete
      source_agent: dgx2
      status: pass
      action: assign_to_agent
      action_args: { target_agent: macmini }

    # Mac Mini completes → Hassio picks up
    - from: waiting_macmini
      to: waiting_hassio
      trigger: agent_complete
      source_agent: macmini
      status: pass
      action: assign_to_agent
      action_args: { target_agent: hassio }

    # Hassio completes → done
    - from: waiting_hassio
      to: idle
      trigger: agent_complete
      source_agent: hassio
      status: pass

    # Any agent fails → flag human
    - from: "*"
      to: idle
      trigger: agent_complete
      status: fail
      action: flag_human
      action_args: { reason: "agent failed task" }
