project: remote-test
tmux:
  session_name: remote-test

nats:
  url: nats://192.168.1.25:4222

agents:
  hub:
    runtime: claude_code
    working_dir: ./workspace
    system_prompt: "You are a collaborator agent on the Mac hub. Complete the assigned task and report results via send_message."
  dgx:
    runtime: claude_code
    ssh_host: dgx@192.168.1.51
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    system_prompt: "You are a collaborator agent on the DGX server. Complete the assigned task and report results via send_message."
  macmini:
    runtime: claude_code
    ssh_host: angelserrano@192.168.1.31
    remote_working_dir: ~/mas-workspace
    remote_bridge_path: ~/mas-bridge/index.js
    remote_node_path: ~/local/bin/node
    system_prompt: "You are a collaborator agent on the Mac Mini. Complete the assigned task and report results via send_message."

state_machine:
  initial: idle
  states:
    idle: { description: "No active task" }
    waiting_hub: { agent: hub }
    waiting_dgx: { agent: dgx }
    waiting_macmini: { agent: macmini }
  transitions:
    - from: idle
      to: waiting_hub
      trigger: task_assigned
      action: assign_to_agent
      action_args: { target_agent: hub }

    - from: waiting_hub
      to: waiting_dgx
      trigger: agent_complete
      source_agent: hub
      status: pass
      action: assign_to_agent
      action_args: { target_agent: dgx }

    - from: waiting_dgx
      to: waiting_macmini
      trigger: agent_complete
      source_agent: dgx
      status: pass
      action: assign_to_agent
      action_args: { target_agent: macmini }

    - from: waiting_macmini
      to: idle
      trigger: agent_complete
      source_agent: macmini
      status: pass

    # Failures
    - from: waiting_hub
      to: idle
      trigger: agent_complete
      source_agent: hub
      status: fail
      action: flag_human
      action_args: { reason: "hub failed" }

    - from: waiting_dgx
      to: idle
      trigger: agent_complete
      source_agent: dgx
      status: fail
      action: flag_human
      action_args: { reason: "dgx failed" }

    - from: waiting_macmini
      to: idle
      trigger: agent_complete
      source_agent: macmini
      status: fail
      action: flag_human
      action_args: { reason: "macmini failed" }
